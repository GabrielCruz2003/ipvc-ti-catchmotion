<!DOCTYPE html>
<html lang="pt-PT">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CatchMotion - O seu Assistente de Fisioterapia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;700&family=Manrope:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Metadados base e tipografia usada pelo layout da app. -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/addons/p5.sound.min.js"></script>
    <script src="https://unpkg.com/ml5@1/dist/ml5.min.js"></script>
    <link rel="stylesheet" type="text/css" href="styles.css" />
  </head>
  <body>
    <script>
      (function () {
        let percentagem = 0;
        const intervalo = setInterval(function () {
          const el = document.getElementById("p5_loading");
          if (!el) {
            clearInterval(intervalo);
            return;
          }

          if (percentagem < 95) {
            percentagem += percentagem < 70 ? 2 : 1;
          }
          el.textContent = "A carregar... " + percentagem + "%";
        }, 120);

        window.__loadingConcluido = function () {
          const el = document.getElementById("p5_loading");
          if (el) {
            el.textContent = "A carregar... 100%";
            el.classList.add("is-done");
          }
          clearInterval(intervalo);
        };
      })();
    </script>

    <main class="app-shell">
      <header class="app-header">
        <span class="app-kicker">Fisioterapia Interativa</span>
        <h1>CatchMotion</h1>
        <p>Reabilitacao motora com interacao por gesto, voz e monitorizacao em tempo real</p>
      </header>
      <section id="app" class="stage-card">
        <div id="p5_loading">A carregar... 0%</div>
      </section>
    </main>
    <!-- Estrutura visual principal: cabecalho + palco onde o canvas e montado. -->
    <script src="js/estado.js"></script>
    <script src="js/modos.js"></script>
    <script src="js/interacao.js"></script>
    <script src="js/renderizacao.js"></script>
    <script src="sketch.js"></script>
    <!-- Ordem importante: estado -> logica -> renderizacao -> entrypoint. -->
  </body>
</html>

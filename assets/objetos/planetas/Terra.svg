<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="300" height="300">
  <defs>
    <radialGradient id="earth-base" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#4facfe" />
      <stop offset="100%" stop-color="#0062a3" />
    </radialGradient>
    <radialGradient id="land" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#a8e063" />
      <stop offset="100%" stop-color="#448c21" />
    </radialGradient>
    <linearGradient id="shadow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="50%" stop-color="#000000" stop-opacity="0" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0.7" />
    </linearGradient>
    <linearGradient id="gloss" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
    <clipPath id="planet-clip">
      <circle cx="100" cy="100" r="90" />
    </clipPath>
  </defs>

  <circle cx="100" cy="100" r="90" fill="url(#earth-base)" stroke="#053252" stroke-width="2"/>

  <g clip-path="url(#planet-clip)">
    <path d="M 30 50 Q 80 10 120 40 Q 140 70 100 90 Q 70 140 50 110 Q 10 80 30 50 Z" fill="url(#land)" />
    <path d="M 140 100 Q 180 80 190 120 Q 170 180 130 150 Q 110 130 140 100 Z" fill="url(#land)" />
    <path d="M 120 -10 Q 160 10 180 -10 Z" fill="url(#land)" />
    
    <path d="M 10 90 Q 40 70 70 85 Q 90 70 120 90 Q 90 110 50 105 Z" fill="#ffffff" opacity="0.85"/>
    <path d="M 130 40 Q 160 20 190 35 Q 180 60 150 50 Z" fill="#ffffff" opacity="0.85"/>
    <path d="M 60 160 Q 90 140 130 155 Q 100 180 70 170 Z" fill="#ffffff" opacity="0.85"/>
  </g>

  <circle cx="100" cy="100" r="90" fill="url(#shadow)" />
  <ellipse cx="100" cy="40" rx="65" ry="22" fill="url(#gloss)" transform="rotate(-15 100 40)" />
</svg>

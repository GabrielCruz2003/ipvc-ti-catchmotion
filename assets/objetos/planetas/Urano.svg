<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <radialGradient id="ura-base" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#bcf0f7" />
      <stop offset="100%" stop-color="#2c9db5" />
    </radialGradient>
    <linearGradient id="shadow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="40%" stop-color="#000000" stop-opacity="0" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0.8" />
    </linearGradient>
    <linearGradient id="gloss" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
    <clipPath id="planet-clip">
      <circle cx="150" cy="150" r="90" />
    </clipPath>
    <clipPath id="front-ring-ura">
      <rect x="-50" y="150" width="400" height="200" transform="rotate(75 150 150)" />
    </clipPath>
  </defs>

  <ellipse cx="150" cy="150" rx="140" ry="12" fill="none" stroke="#ffffff" stroke-width="3" transform="rotate(75 150 150)" opacity="0.3"/>

  <circle cx="150" cy="150" r="90" fill="url(#ura-base)" stroke="#1d6c7d" stroke-width="2" />

  <g clip-path="url(#planet-clip)">
    <path d="M 90 0 Q 70 150 90 300 L 120 300 Q 100 150 120 0 Z" fill="#ffffff" opacity="0.15" transform="rotate(75 150 150)"/>
    <path d="M 160 0 Q 140 150 160 300 L 200 300 Q 180 150 200 0 Z" fill="#0b7a8f" opacity="0.2" transform="rotate(75 150 150)"/>
  </g>

  <circle cx="150" cy="150" r="90" fill="url(#shadow)" />
  <ellipse cx="150" cy="85" rx="65" ry="22" fill="url(#gloss)" transform="rotate(-15 150 85)" />

  <g clip-path="url(#front-ring-ura)">
    <ellipse cx="150" cy="150" rx="140" ry="12" fill="none" stroke="#ffffff" stroke-width="4" transform="rotate(75 150 150)" opacity="0.6"/>
    <ellipse cx="150" cy="150" rx="125" ry="9" fill="none" stroke="#90e5f2" stroke-width="1.5" transform="rotate(75 150 150)" opacity="0.5"/>
  </g>
</svg>

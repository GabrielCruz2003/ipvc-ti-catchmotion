    <path d="M 0 110 Q 100 130 200 110 L 200 140 Q 100 160 0 140 Z" fill="#a86948" opacity="0.7"/>
    <path d="M 0 155 Q 100 170 200 155 L 200 180 Q 100 190 0 180 Z" fill="#693c26" opacity="0.5"/>
    
    <ellipse cx="140" cy="125" rx="22" ry="12" fill="#ba4822" transform="rotate(-10 140 125)"/>
    <ellipse cx="140" cy="125" rx="14" ry="7" fill="#e86e46" transform="rotate(-10 140 125)"/>
    <path d="M 110 125 Q 140 100 170 135" fill="none" stroke="#e8cdb7" stroke-width="3" opacity="0.6" stroke-linecap="round"/>
  </g>

  <circle cx="100" cy="100" r="90" fill="url(#shadow)" />
  <ellipse cx="100" cy="40" rx="65" ry="22" fill="url(#gloss)" transform="rotate(-15 100 40)" />

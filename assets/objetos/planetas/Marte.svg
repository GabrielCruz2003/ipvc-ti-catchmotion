<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="300" height="300">
  <defs>
    <radialGradient id="mars-base" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#eb5757" />
      <stop offset="100%" stop-color="#931a1a" />
    </radialGradient>
    <linearGradient id="shadow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="40%" stop-color="#000000" stop-opacity="0" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0.75" />
    </linearGradient>
    <linearGradient id="gloss" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
    <clipPath id="planet-clip">
      <circle cx="100" cy="100" r="90" />
    </clipPath>
  </defs>

  <circle cx="100" cy="100" r="90" fill="url(#mars-base)" stroke="#4a0808" stroke-width="2" />

  <g clip-path="url(#planet-clip)">
    <path d="M 20 70 C 50 30, 100 80, 140 60 C 180 40, 170 120, 120 110 C 80 100, 50 140, 20 70 Z" fill="#5c0f0f" opacity="0.6"/>
    <path d="M 130 150 C 150 120, 190 140, 180 180 C 140 200, 110 180, 130 150 Z" fill="#5c0f0f" opacity="0.6"/>
    <path d="M -10 120 C 20 100, 50 150, 20 180 Z" fill="#5c0f0f" opacity="0.5"/>
    
    <ellipse cx="100" cy="15" rx="35" ry="8" fill="#ffffff" opacity="0.9"/>
    <ellipse cx="110" cy="185" rx="25" ry="6" fill="#ffffff" opacity="0.7"/>
  </g>

  <circle cx="100" cy="100" r="90" fill="url(#shadow)" />
  <ellipse cx="100" cy="40" rx="65" ry="22" fill="url(#gloss)" transform="rotate(-15 100 40)" />
</svg>

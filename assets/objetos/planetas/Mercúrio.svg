<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="300" height="300">
  <defs>
    <radialGradient id="merc-base" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#a0a5ad" />
      <stop offset="100%" stop-color="#4e5359" />
    </radialGradient>
    <linearGradient id="shadow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="40%" stop-color="#000000" stop-opacity="0" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0.7" />
    </linearGradient>
    <linearGradient id="gloss" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
    <clipPath id="planet-clip">
      <circle cx="100" cy="100" r="90" />
    </clipPath>
  </defs>

  <circle cx="100" cy="100" r="90" fill="url(#merc-base)" stroke="#303338" stroke-width="2" />

  <g clip-path="url(#planet-clip)">
    <circle cx="60" cy="70" r="18" fill="#3b3f45" />
    <circle cx="62" cy="72" r="15" fill="#6a6f75" />
    <circle cx="140" cy="120" r="25" fill="#3b3f45" />
    <circle cx="143" cy="123" r="21" fill="#6a6f75" />
    <circle cx="90" cy="150" r="12" fill="#3b3f45" />
    <circle cx="91" cy="151" r="10" fill="#6a6f75" />
    <circle cx="160" cy="50" r="15" fill="#3b3f45" />
    <circle cx="162" cy="52" r="12" fill="#6a6f75" />
    <circle cx="40" cy="130" r="5" fill="#3b3f45" opacity="0.6"/>
    <circle cx="110" cy="40" r="4" fill="#3b3f45" opacity="0.6"/>
  </g>

  <circle cx="100" cy="100" r="90" fill="url(#shadow)" />
  <ellipse cx="100" cy="40" rx="65" ry="22" fill="url(#gloss)" transform="rotate(-15 100 40)" />
</svg>

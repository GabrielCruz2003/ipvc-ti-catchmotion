<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="450" height="300">
  <defs>
    <radialGradient id="sat-base" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#fae3ba" />
      <stop offset="100%" stop-color="#b89a65" />
    </radialGradient>
    <linearGradient id="shadow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="40%" stop-color="#000000" stop-opacity="0" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0.8" />
    </linearGradient>
    <linearGradient id="gloss" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
    
    <clipPath id="planet-clip">
      <circle cx="150" cy="100" r="70" />
    </clipPath>
    <clipPath id="front-ring-clip">
      <rect x="-50" y="100" width="400" height="200" transform="rotate(-20 150 100)" />
    </clipPath>
  </defs>

  <ellipse cx="150" cy="100" rx="130" ry="35" fill="none" stroke="#cfb686" stroke-width="18" transform="rotate(-20 150 100)" opacity="0.9"/>
  <ellipse cx="150" cy="100" rx="110" ry="25" fill="none" stroke="#a38958" stroke-width="6" transform="rotate(-20 150 100)" opacity="0.8"/>

  <circle cx="150" cy="100" r="70" fill="url(#sat-base)" stroke="#6e5730" stroke-width="2" />
  
  <g clip-path="url(#planet-clip)">
    <path d="M 50 60 Q 150 75 250 60 L 250 80 Q 150 95 50 80 Z" fill="#d9b984" opacity="0.6"/>
    <path d="M 50 110 Q 150 125 250 110 L 250 140 Q 150 155 50 140 Z" fill="#a88854" opacity="0.5"/>
  </g>

  <circle cx="150" cy="100" r="70" fill="url(#shadow)" />
  <ellipse cx="150" cy="50" rx="50" ry="16" fill="url(#gloss)" transform="rotate(-20 150 50)" />

  <path d="M 85 105 Q 150 125 210 95" fill="none" stroke="#000000" stroke-width="8" opacity="0.3" clip-path="url(#planet-clip)" />

  <g clip-path="url(#front-ring-clip)">
    <ellipse cx="150" cy="100" rx="130" ry="35" fill="none" stroke="#e0c694" stroke-width="18" transform="rotate(-20 150 100)" />
    <ellipse cx="150" cy="100" rx="110" ry="25" fill="none" stroke="#8a703f" stroke-width="6" transform="rotate(-20 150 100)" />
    <ellipse cx="150" cy="100" rx="142" ry="42" fill="none" stroke="#b8a174" stroke-width="4" transform="rotate(-20 150 100)" opacity="0.7"/>
  </g>
</svg>
